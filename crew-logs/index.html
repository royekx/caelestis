<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caelestis — Crew Logs</title>
<link rel="stylesheet" href="../styles/caelestis.css">
<style>
  .log-table { width: 100%; margin-top: 0.5rem; }

  .log-row {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 1.2rem;
    padding: 1rem 1.2rem;
    border: 1px solid var(--gold-rule);
    border-bottom: none;
    background: var(--bg-card);
    position: relative;
    transition: background 0.2s, border-color 0.2s;
    animation: fadeUp 0.6s ease both;
  }
  .log-row:last-child { border-bottom: 1px solid var(--gold-rule); }
  .log-row:hover { background: rgba(201,153,58,0.04); border-color: rgba(201,153,58,0.3); }
  .log-row::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--gold-dim); opacity: 0.4; transition: opacity 0.2s;
  }
  .log-row:hover::before { opacity: 1; }

  .log-row:nth-child(1){ animation-delay:0.05s; }
  .log-row:nth-child(2){ animation-delay:0.10s; }
  .log-row:nth-child(3){ animation-delay:0.15s; }

  .log-num {
    font-family: 'Cinzel', serif;
    display: flex; flex-direction: column;
    align-items: center; gap: 0.15rem;
  }
  .log-num-label {
    font-size: 0.52rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold-dim);
  }
  .log-num-val {
    font-size: 1.4rem; font-weight: 700;
    color: var(--text-dim); line-height: 1;
  }

  .log-title {
    font-family: 'Cinzel', serif; font-size: 0.9rem;
    font-weight: 700; color: var(--text); letter-spacing: 0.02em;
  }

  .log-links { display: flex; gap: 0.5rem; flex-shrink: 0; }

  .log-link {
    font-family: 'Cinzel', serif; font-size: 0.57rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.3rem 0.7rem; border: 1px solid var(--gold-rule);
    color: var(--gold-dim); text-decoration: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .log-link:hover {
    border-color: var(--gold-dim); color: var(--gold-light);
    background: rgba(201,153,58,0.06);
  }
  .log-link-brief {
    border-color: rgba(30,74,122,0.4); color: #5a8ab8;
  }
  .log-link-brief:hover {
    border-color: rgba(30,74,122,0.7); color: #7aaad0;
    background: rgba(30,74,122,0.06);
  }

  .intro-note {
    background: var(--gold-faint); border-left: 3px solid var(--gold-dim);
    padding: 0.7rem 1rem; font-size: 0.88rem; line-height: 1.55;
    color: var(--text-dim); margin-bottom: 2rem; font-style: italic;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @media(max-width:520px){
    .log-row { grid-template-columns: 55px 1fr; }
    .log-links { grid-column: 1 / -1; padding-top: 0.5rem; border-top: 1px solid var(--gold-rule); }
  }
</style>
  <script src="../scripts/nav.js" defer></script>
</head>
