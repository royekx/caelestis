<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caelestis — Spelljammer Nexus</title>
<link rel="stylesheet" href="../styles/caelestis.css">
<script src="../scripts/nav.js" defer></script>
<script src="../data/nexus.js"></script>
<style>
  .nexus-list { display: flex; flex-direction: column; }

  .nexus-entry {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 1.5rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--gold-rule);
    text-decoration: none;
    transition: padding-left 0.18s;
  }
  .nexus-entry:first-child { border-top: 1px solid var(--gold-rule); }
  .nexus-entry:hover { padding-left: 0.4rem; }

  .nexus-entry-name {
    font-family: 'Cinzel', serif;
    font-size: 0.92rem; font-weight: 600;
    color: var(--gold); margin-bottom: 0.2rem;
    transition: color 0.18s;
  }
  .nexus-entry:hover .nexus-entry-name { color: #e8c87a; }
  .nexus-entry-sub { font-size: 0.82rem; color: var(--text-dim); font-style: italic; }

  .nexus-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.46rem; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--gold-rule);
    color: var(--text-muted);
    white-space: nowrap; flex-shrink: 0;
  }
  .nexus-entry.restricted .nexus-entry-name  { color: rgba(201,153,58,0.6); }
  .nexus-entry.restricted:hover .nexus-entry-name { color: rgba(201,153,58,0.85); }
  .nexus-entry.restricted { border-top: 1px solid rgba(139,32,32,0.2) !important; }
  .nexus-badge.restricted {
    border-color: rgba(139,32,32,0.4);
    color: rgba(180,60,60,0.8);
  }
</style>
</head>
<body class="with-sidebar">
<div class="page-content">

  <div class="page-header">
    <div class="page-emblem">
      <svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <circle cx="30" cy="30" r="26"/>
        <circle cx="30" cy="30" r="18"/>
        <circle cx="30" cy="30" r="4" fill="currentColor" stroke="none"/>
        <line x1="30" y1="4"  x2="30" y2="12"/>
        <line x1="30" y1="48" x2="30" y2="56"/>
        <line x1="4"  y1="30" x2="12" y2="30"/>
        <line x1="48" y1="30" x2="56" y2="30"/>
        <line x1="30" y1="12" x2="24" y2="26"/>
        <line x1="24" y1="26" x2="30" y2="30"/>
        <line x1="30" y1="30" x2="38" y2="22"/>
      </svg>
    </div>
    <div class="page-eyebrow">Caelestis · Spelljammer Academy</div>
    <h1 class="page-title">Spelljammer Nexus</h1>
    <p class="page-subtitle">Reference library. Academy and Wildspace fundamentals.</p>
  </div>

  <div class="content">
    <div class="nexus-list" id="nexus-list">
      <!-- populated by nexus.js -->
    </div>
  </div>

</div>

<script>
(function () {
  var list = document.getElementById('nexus-list');
  if (!list || typeof CAELESTIS_NEXUS === 'undefined') return;

  CAELESTIS_NEXUS.forEach(function (entry) {
    var isRestricted = !!entry.restricted;
    var a = document.createElement('a');
    a.className = 'nexus-entry' + (isRestricted ? ' restricted' : '');
    a.href = entry.href;

    var badgeClass = 'nexus-badge' + (isRestricted ? ' restricted' : '');

    a.innerHTML =
      '<div>' +
        '<div class="nexus-entry-name">' + entry.title + '</div>' +
        '<div class="nexus-entry-sub">' + entry.sub + '</div>' +
      '</div>' +
      '<span class="' + badgeClass + '">' + entry.badge + '</span>';

    list.appendChild(a);
  });
})();
</script>

</body>
</html>
