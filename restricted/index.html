<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Intelligence Archive — Spelljammer Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #030208;
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

/* Star field */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 60%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 6%  55%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 55% 45%, rgba(255,255,255,0.15) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.gate-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  text-align: center;
}

/* Outer ornamental border */
.gate-border {
  border: 1px solid rgba(201,153,58,0.2);
  padding: 3rem 2.5rem 2.5rem;
  position: relative;
  background: rgba(6,4,14,0.95);
}
.gate-border::before, .gate-border::after,
.gate-border .corner-br, .gate-border .corner-tl-inner {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border: 1px solid rgba(201,153,58,0.5);
}
.gate-border::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.gate-border::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }
.corner-tr { position:absolute; top:-1px; right:-1px; width:20px; height:20px; border:1px solid rgba(201,153,58,0.5); border-left:none; border-bottom:none; }
.corner-bl { position:absolute; bottom:-1px; left:-1px; width:20px; height:20px; border:1px solid rgba(201,153,58,0.5); border-right:none; border-top:none; }

/* Academy seal */
.gate-seal {
  width: 56px; height: 56px;
  margin: 0 auto 1.4rem;
  color: rgba(201,153,58,0.5);
}

.gate-institution {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(201,153,58,0.4);
  margin-bottom: 0.25rem;
}
.gate-division {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(201,153,58,0.3);
  margin-bottom: 1.4rem;
}

.gate-rule {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(201,153,58,0.3), transparent);
  margin-bottom: 1.4rem;
}

.gate-title {
  font-family: 'Cinzel', serif;
  font-size: 1.25rem;
  font-weight: 400;
  color: #c9a96e;
  letter-spacing: 0.06em;
  margin-bottom: 0.4rem;
}
.gate-sub {
  font-size: 0.85rem;
  color: rgba(201,153,58,0.4);
  font-style: italic;
  margin-bottom: 2rem;
  line-height: 1.5;
}

/* Clearance form */
.clearance-label {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(201,153,58,0.4);
  margin-bottom: 0.5rem;
  display: block;
}
.clearance-input {
  width: 100%;
  background: rgba(201,153,58,0.04);
  border: none;
  border-bottom: 1px solid rgba(201,153,58,0.25);
  color: #c9a96e;
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 1.1rem;
  padding: 0.6rem 0.5rem;
  text-align: center;
  letter-spacing: 0.25em;
  outline: none;
  margin-bottom: 1.2rem;
  transition: border-color 0.2s;
  background: transparent;
}
.clearance-input:focus { border-color: rgba(201,153,58,0.6); }
.clearance-input::placeholder { color: rgba(201,153,58,0.15); letter-spacing: 0.1em; font-size: 0.88rem; }
.clearance-btn {
  width: 100%;
  background: transparent;
  border: 1px solid rgba(201,153,58,0.25);
  color: rgba(201,153,58,0.7);
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.8rem;
  cursor: pointer;
  transition: all 0.25s;
}
.clearance-btn:hover {
  border-color: rgba(201,153,58,0.6);
  color: #c9a96e;
  background: rgba(201,153,58,0.04);
}

.gate-warning {
  margin-top: 1.5rem;
  font-size: 0.72rem;
  color: rgba(180,40,40,0.5);
  font-style: italic;
  line-height: 1.6;
}
.gate-warning strong { color: rgba(180,40,40,0.7); font-style: normal; }
</style>
</head>
<body>
<div class="gate-wrap">
  <div class="gate-border">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>

    <div class="gate-seal">
      <svg viewBox="0 0 56 56" fill="none" stroke="currentColor" stroke-width="1">
        <circle cx="28" cy="28" r="26"/>
        <circle cx="28" cy="28" r="20" stroke-dasharray="2 3"/>
        <polygon points="28,8 31.5,19 43,19 34,26.5 37.5,38 28,31 18.5,38 22,26.5 13,19 24.5,19" stroke-width="0.8"/>
        <circle cx="28" cy="28" r="5" fill="none"/>
        <circle cx="28" cy="28" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
    </div>

    <div class="gate-institution">Spelljammer Academy</div>
    <div class="gate-division">Fleet Intelligence Division</div>
    <div class="gate-rule"></div>

    <div class="gate-title">Classified Archive</div>
    <div class="gate-sub">Gold-level clearance required.<br>Authorised bridge personnel only.</div>

    <label class="clearance-label" for="code-input">Clearance Code</label>
    <input type="password" class="clearance-input" id="code-input" placeholder="— — — — —" autocomplete="off" spellcheck="false">
    <button class="clearance-btn" onclick="checkCode()">Submit for Clearance</button>

    <p class="gate-warning">
      Unauthorised access attempts are logged and transmitted to bridge command.<br>
      <strong>Failure to present valid clearance will result in disintegration.</strong>
    </p>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// CLEARANCE CODE — Set to whatever you seed in-game.
// Default: 'tarto'
// How to seed: write the code on Boatswain Tarto's desk, in a
// corridor notice, or as a prop the players can physically read.
// ─────────────────────────────────────────────────────────────────
var CODE = 'flotsam&jetsam';
var SESSION_KEY = 'caelestis_restricted_v1';

function checkCode() {
  var val = document.getElementById('code-input').value.trim().toLowerCase();
  if (val === CODE.toLowerCase()) {
    sessionStorage.setItem(SESSION_KEY, '1');
    window.location.href = 'files.html';
  } else {
    window.location.href = 'disintegration.html';
  }
}
document.getElementById('code-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') checkCode();
});
</script>
</body>
</html>
