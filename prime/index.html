<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond Caelestis</title>
<meta name="robots" content="noindex, nofollow">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Georgia', serif;
  background: #06040e;
  color: #c9a96e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── GATE ── */
#gate {
  text-align: center;
  padding: 3rem 2rem;
  max-width: 360px;
  width: 100%;
}
#gate h1 {
  font-family: 'Georgia', serif;
  font-size: 1.2rem;
  font-weight: normal;
  letter-spacing: 0.08em;
  color: #c9a96e;
  margin-bottom: 0.4rem;
}
#gate p {
  font-size: 0.82rem;
  color: #6a5a3a;
  margin-bottom: 1.8rem;
  font-style: italic;
}
#gate input {
  width: 100%;
  background: rgba(201,169,110,0.06);
  border: 1px solid rgba(201,169,110,0.25);
  color: #c9a96e;
  font-family: 'Georgia', serif;
  font-size: 1rem;
  padding: 0.7rem 1rem;
  text-align: center;
  letter-spacing: 0.2em;
  outline: none;
  margin-bottom: 1rem;
}
#gate input::placeholder { color: rgba(201,169,110,0.3); letter-spacing: 0.1em; }
#gate input:focus { border-color: rgba(201,169,110,0.6); }
#gate button {
  width: 100%;
  background: transparent;
  border: 1px solid rgba(201,169,110,0.4);
  color: #c9a96e;
  font-family: 'Georgia', serif;
  font-size: 0.82rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.65rem 1rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
#gate button:hover { border-color: #c9a96e; background: rgba(201,169,110,0.08); }
#gate-error {
  font-size: 0.78rem;
  color: #8a3030;
  margin-top: 0.8rem;
  display: none;
}

/* ── REDIRECT MESSAGE ── */
/* Briefly shown after successful auth while the page redirects to hub.html. */
#redirect {
  display: none;
  text-align: center;
  padding: 3rem 2rem;
  max-width: 360px;
  width: 100%;
}
#redirect p {
  font-size: 0.85rem;
  color: #c9a96e;
  letter-spacing: 0.1em;
  font-style: italic;
}
#redirect a {
  display: inline-block;
  margin-top: 1rem;
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #6a5a3a;
  text-decoration: none;
  border-bottom: 1px dotted rgba(201,169,110,0.3);
  padding-bottom: 2px;
}
#redirect a:hover { color: #c9a96e; }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <h1>Beyond Caelestis</h1>
  <p>Axiom Access Only.</p>
  <input type="password" id="pw-input" placeholder="passphrase" autocomplete="off">
  <button onclick="checkPassword()">Enter</button>
  <div id="gate-error">Access denied.</div>
</div>

<!-- REDIRECT (shown briefly after successful auth) -->
<div id="redirect">
  <p>Accessing&hellip;</p>
  <a href="hub.html">Continue to DM space &rarr;</a>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// CHANGE THIS to your own passphrase. Client-side security — adequate
// for accidental-discovery prevention, not for serious adversaries.
// ─────────────────────────────────────────────────────────────────
var DM_PASSWORD = 'continuum';

var SESSION_KEY = 'caelestis_continuum_auth';
var HUB_URL     = 'hub.html';

function checkPassword() {
  var input = document.getElementById('pw-input').value.trim().toLowerCase();
  if (input === DM_PASSWORD.toLowerCase()) {
    sessionStorage.setItem(SESSION_KEY, '1');
    redirectToHub();
  } else {
    document.getElementById('gate-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function redirectToHub() {
  // Hide the gate, show the redirect message (in case the navigation is slow
  // or blocked — gives the user a manual link as a fallback).
  document.getElementById('gate').style.display = 'none';
  document.getElementById('redirect').style.display = 'block';
  // Use replace() so the gate isn't in the back-button history.
  window.location.replace(HUB_URL);
}

// Auto-unlock if already authenticated this session — skip the gate entirely.
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  redirectToHub();
}

// Allow Enter key on password input
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPassword();
});
</script>

<!--
═══════════════════════════════════════════════════════════════════
SECURITY NOTES
═══════════════════════════════════════════════════════════════════

CURRENT (JS gate — free, adequate):
  This password is CLIENT-SIDE. A determined player who views page
  source can find and bypass it. For a D&D campaign this is fine —
  it stops accidental discovery cold. Change DM_PASSWORD above to
  something you'll remember.

GATE FLOW:
  1. Visitor lands on /prime/ (this page).
  2. If sessionStorage already has the auth flag, redirect straight
     to hub.html.
  3. Otherwise show the password field. On correct entry, set the
     flag and redirect to hub.html.
  4. Sign-out lives on the hub side (clears sessionStorage and
     sends back here).

STRONGER (private repo — free, no public exposure):
  Keep DM notes in a separate private GitHub repo. Never publish
  to GitHub Pages. Players literally cannot find them.
═══════════════════════════════════════════════════════════════════
-->

</body>
</html>
